<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damas no Plano Cartesiano</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #eef2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { margin-bottom: 5px; color: #2c3e50; }
        .sub-header { margin-bottom: 20px; color: #7f8c8d; font-size: 1.1em; }
        
        .game-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex: 1;
        }
        
        .board-wrapper {
            display: flex;
            flex-direction: column;
        }
        .board-row { display: flex; }
        .square {
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dark { background-color: #a0522d; } 
        .light { background-color: #f5deb3; }
        
        /* Peças */
        .piece {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px; /* Tamanho da coroa */
        }
        .red { background-color: #ff4757; border: 4px solid #b33939; }
        .black { background-color: #2f3542; border: 4px solid #1e2229; }
        
        /* Eixos Cartesianos */
        .y-axis { display: flex; flex-direction: column; width: 35px; }
        .y-label { 
            height: 65px; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 22px; color: #57606f;
        }
        .x-axis { display: flex; padding-left: 35px; height: 35px; }
        .x-label { 
            width: 65px; display: flex; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 22px; color: #57606f;
        }
        
        /* Painel de Controles */
        .controls {
            background-color: white; padding: 25px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex;
            flex-direction: column; gap: 15px; width: 340px;
        }

        .current-turn { 
            font-size: 32px; text-transform: uppercase; letter-spacing: 1px;
            text-align: center; margin-bottom: 10px; font-weight: 900;
            border-bottom: 3px solid #eee; padding-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .input-group {
            display: flex; flex-direction: column; gap: 8px;
            background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef;
        }
        .input-label { font-weight: 700; color: #2c3e50; font-size: 1.1em; }
        .input-row { display: flex; gap: 10px; align-items: center; justify-content: center; font-weight: bold;}
        .coord-input {
            width: 60px; padding: 10px; font-size: 22px; font-weight: bold;
            text-align: center; border: 2px solid #ddd; border-radius: 6px;
            transition: border-color 0.2s;
        }
        .coord-input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 8px rgba(52, 152, 219, 0.3); }
        
        button {
            padding: 18px; font-size: 20px; text-transform: uppercase; letter-spacing: 1px;
            background-color: #27ae60; color: white; border: none; border-radius: 8px;
            cursor: pointer; font-weight: 900; transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 0 #219653;
        }
        button:hover { background-color: #2ecc71; }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #219653; }
        button:disabled { background-color: #95a5a6; box-shadow: 0 4px 0 #7f8c8d; cursor: not-allowed; }
        
        #message {
            font-weight: 900; min-height: 24px; text-align: center; margin-top: 10px;
            font-size: 1.3em; text-transform: uppercase; padding: 0; border-radius: 8px;
            transition: all 0.3s; opacity: 0; transform: scale(0.8);
        }

        footer {
            margin-top: 40px; padding: 20px 0; width: 100%; text-align: center;
            font-weight: 600; color: #7f8c8d; font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Damas no Plano Cartesiano</h1>
    <div class="sub-header">Utilize as coordenadas (X, Y) para mover as peças.</div>

    <div class="game-container">
        <div style="display: flex; flex-direction: column;">
            <div style="display: flex;">
                <div class="y-axis" id="y-axis"></div>
                <div class="board-wrapper" id="board"></div>
            </div>
            <div class="x-axis" id="x-axis"></div>
        </div>

        <div class="controls">
            <div class="current-turn" id="turn-display">VEZ DAS <br><span style="color:#ff4757; font-size: 1.2em;">VERMELHAS</span></div>
            
            <div class="input-group">
                <div class="input-label">1. Origem da Peça</div>
                <div class="input-row">
                    X: <input type="number" id="orig-x" class="coord-input" min="0" max="7">
                    Y: <input type="number" id="orig-y" class="coord-input" min="0" max="7">
                </div>
            </div>

            <div class="input-group">
                <div class="input-label">2. Destino</div>
                <div class="input-row">
                    X: <input type="number" id="dest-x" class="coord-input" min="0" max="7">
                    Y: <input type="number" id="dest-y" class="coord-input" min="0" max="7">
                </div>
            </div>

            <button onclick="fazerJogada()" id="btn-jogar">Enviar Jogada</button>
            <div id="message"></div>
        </div>
    </div>

    <footer>@experimentajoao | Soluções no Ensino de Matemática</footer>

    <script>
        let boardState = [];
        let currentPlayer = 1; // 1 = Vermelhas, 2 = Pretas
        let turnState = 'normal'; // Pode ser 'normal' ou 'multi_jump'
        let activePiece = null; // Guarda a coordenada da peça que deve continuar comendo

        // Identificadores das peças: 1 (Vermelha), 2 (Preta), 3 (Dama Vermelha), 4 (Dama Preta)
        const isRed = (p) => p === 1 || p === 3;
        const isBlack = (p) => p === 2 || p === 4;
        const isDama = (p) => p === 3 || p === 4;
        const getPlayer = (p) => isRed(p) ? 1 : isBlack(p) ? 2 : 0;

        function initBoard() {
            boardState = [];
            for (let rowIdx = 0; rowIdx < 8; rowIdx++) {
                let row = [];
                let y = 7 - rowIdx; 
                for (let x = 0; x <= 7; x++) {
                    let isDarkSquare = (x + y) % 2 === 0;
                    if (isDarkSquare && y <= 2) row.push(1);
                    else if (isDarkSquare && y >= 5) row.push(2);
                    else row.push(0);
                }
                boardState.push(row);
            }
        }

        function drawBoard() {
            const board = document.getElementById('board');
            const yAxis = document.getElementById('y-axis');
            const xAxis = document.getElementById('x-axis');
            
            board.innerHTML = ''; yAxis.innerHTML = ''; xAxis.innerHTML = '';

            // Lógica de Rotação Baseada no Turno
            let yStart = currentPlayer === 1 ? 7 : 0;
            let yEnd = currentPlayer === 1 ? -1 : 8;
            let yStep = currentPlayer === 1 ? -1 : 1;

            let xStart = currentPlayer === 1 ? 0 : 7;
            let xEnd = currentPlayer === 1 ? 8 : -1;
            let xStep = currentPlayer === 1 ? 1 : -1;

            // Renderiza eixo X invertido ou normal
            for (let x = xStart; x !== xEnd; x += xStep) {
                let xLabel = document.createElement('div');
                xLabel.className = 'x-label';
                xLabel.innerText = x;
                xAxis.appendChild(xLabel);
            }

            // Renderiza Tabuleiro e Eixo Y invertidos ou normais
            for (let yVal = yStart; yVal !== yEnd; yVal += yStep) {
                let rowIdx = 7 - yVal; 
                
                let yLabel = document.createElement('div');
                yLabel.className = 'y-label';
                yLabel.innerText = yVal;
                yAxis.appendChild(yLabel);

                let rowDiv = document.createElement('div');
                rowDiv.className = 'board-row';
                
                for (let xVal = xStart; xVal !== xEnd; xVal += xStep) {
                    let colIdx = xVal;
                    let square = document.createElement('div');
                    let isDark = (xVal + yVal) % 2 === 0;
                    
                    square.className = 'square ' + (isDark ? 'dark' : 'light');

                    let pieceVal = boardState[rowIdx][colIdx];
                    if (pieceVal !== 0) {
                        let piece = document.createElement('div');
                        piece.className = 'piece ' + (isRed(pieceVal) ? 'red' : 'black');
                        if (isDama(pieceVal)) piece.innerText = '👑';
                        square.appendChild(piece);
                    }
                    rowDiv.appendChild(square);
                }
                board.appendChild(rowDiv);
            }
        }

        function mostrarMensagem(msg, isError = true, persistent = false) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = msg;
            msgDiv.style.opacity = '1';
            msgDiv.style.transform = 'scale(1)';
            msgDiv.style.padding = '12px';
            msgDiv.style.color = '#fff';
            msgDiv.style.boxShadow = '0 4px 10px rgba(0,0,0,0.2)';
            msgDiv.style.backgroundColor = isError ? '#e74c3c' : '#2ecc71';

            if (!isError && !persistent) {
                setTimeout(() => {
                    msgDiv.style.opacity = '0';
                    msgDiv.style.transform = 'scale(0.8)';
                }, 3000);
            }
        }

        function limparInputs() {
            document.getElementById('orig-x').value = ''; document.getElementById('orig-y').value = '';
            document.getElementById('dest-x').value = ''; document.getElementById('dest-y').value = '';
            document.getElementById('orig-x').focus();
        }

        function getPathPieces(ox, oy, dx, dy) {
            let pieces = [];
            let steps = Math.abs(dx - ox);
            let dirX = (dx - ox) > 0 ? 1 : -1;
            let dirY = (dy - oy) > 0 ? 1 : -1;
            
            for (let i = 1; i < steps; i++) {
                let checkX = ox + (i * dirX);
                let checkY = oy + (i * dirY);
                let r = 7 - checkY, c = checkX;
                if (boardState[r][c] !== 0) {
                    pieces.push({x: checkX, y: checkY, val: boardState[r][c], r: r, c: c});
                }
            }
            return pieces;
        }

        function hasAvailableCaptures(startX, startY) {
            let r = 7 - startY, c = startX;
            let piece = boardState[r][c];
            let pOwner = getPlayer(piece);
            let dirs = [[1,1], [1,-1], [-1,1], [-1,-1]];
            
            for (let d of dirs) {
                if (isDama(piece)) {
                    let step = 1, foundEnemy = false;
                    while(true) {
                        let tx = startX + d[0]*step, ty = startY + d[1]*step;
                        if (tx < 0 || tx > 7 || ty < 0 || ty > 7) break;
                        let tPiece = boardState[7 - ty][tx];
                        if (tPiece !== 0) {
                            if (getPlayer(tPiece) === pOwner) break; 
                            if (getPlayer(tPiece) !== pOwner) {
                                if (foundEnemy) break; 
                                foundEnemy = true;
                            }
                        } else if (foundEnemy) {
                            return true; // Há uma casa vazia após o inimigo
                        }
                        step++;
                    }
                } else {
                    let tx = startX + d[0]*2, ty = startY + d[1]*2;
                    let mx = startX + d[0], my = startY + d[1];
                    if (tx >= 0 && tx <= 7 && ty >= 0 && ty <= 7) {
                        if (boardState[7 - ty][tx] === 0 && boardState[7 - my][mx] !== 0 && getPlayer(boardState[7 - my][mx]) !== pOwner) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function checkWin() {
            let redCount = 0, blackCount = 0;
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(isRed(boardState[r][c])) redCount++;
                    if(isBlack(boardState[r][c])) blackCount++;
                }
            }
            if (redCount === 0) return 2;
            if (blackCount === 0) return 1;
            return 0;
        }

        function fazerJogada() {
            let ox = parseInt(document.getElementById('orig-x').value);
            let oy = parseInt(document.getElementById('orig-y').value);
            let dx = parseInt(document.getElementById('dest-x').value);
            let dy = parseInt(document.getElementById('dest-y').value);

            if (isNaN(ox) || isNaN(oy) || isNaN(dx) || isNaN(dy)) return mostrarMensagem("Preencha todas as coordenadas!");
            if (ox<0 || ox>7 || oy<0 || oy>7 || dx<0 || dx>7 || dy<0 || dy>7) return mostrarMensagem("Fora do limite (Use 0 a 7)!");

            if (turnState === 'multi_jump') {
                if (ox !== activePiece.x || oy !== activePiece.y) {
                    return mostrarMensagem(`Capture com a peça em (${activePiece.x}, ${activePiece.y})!`);
                }
            }

            let oCol = ox, oRow = 7 - oy;
            let dCol = dx, dRow = 7 - dy;
            let piece = boardState[oRow][oCol];
            let pOwner = getPlayer(piece);
            
            if (piece === 0) return mostrarMensagem("Casa de origem vazia!");
            if (pOwner !== currentPlayer) return mostrarMensagem(`Vez das ${currentPlayer === 1 ? 'VERMELHAS' : 'PRETAS'}!`);
            if (boardState[dRow][dCol] !== 0) return mostrarMensagem("Casa de destino ocupada!");
            if (Math.abs(dx - ox) !== Math.abs(dy - oy)) return mostrarMensagem("Movimento deve ser na diagonal!");

            let diffX = dx - ox, diffY = dy - oy;
            let moveu = false, capturou = false;

            if (isDama(piece)) {
                let pathPieces = getPathPieces(ox, oy, dx, dy);
                if (pathPieces.length === 0) {
                    if (turnState === 'multi_jump') return mostrarMensagem("Você é obrigado a capturar!");
                    boardState[dRow][dCol] = piece; boardState[oRow][oCol] = 0; moveu = true;
                } else if (pathPieces.length === 1) {
                    if (getPlayer(pathPieces[0].val) === pOwner) return mostrarMensagem("Não pode capturar a própria peça!");
                    boardState[pathPieces[0].r][pathPieces[0].c] = 0; // Remove capturada
                    boardState[dRow][dCol] = piece; boardState[oRow][oCol] = 0;
                    moveu = true; capturou = true;
                } else {
                    return mostrarMensagem("Movimento inválido! Muitas peças no caminho.");
                }
            } else {
                let direcaoY = (pOwner === 1) ? 1 : -1; 
                if (Math.abs(diffX) === 1 && diffY === direcaoY) {
                    if (turnState === 'multi_jump') return mostrarMensagem("Você é obrigado a capturar!");
                    boardState[dRow][dCol] = piece; boardState[oRow][oCol] = 0; moveu = true;
                } 
                else if (Math.abs(diffX) === 2 && Math.abs(diffY) === 2) {
                    let meioCol = oCol + (diffX / 2), meioRow = oRow - (diffY / 2); 
                    let pecaCapturada = boardState[meioRow][meioCol];
                    if (pecaCapturada !== 0 && getPlayer(pecaCapturada) !== pOwner) {
                        boardState[meioRow][meioCol] = 0; boardState[dRow][dCol] = piece; boardState[oRow][oCol] = 0;
                        moveu = true; capturou = true;
                    } else {
                        return mostrarMensagem("Captura inválida!");
                    }
                } else {
                    return mostrarMensagem("Movimento não permitido!");
                }
            }

            if (moveu) {
                let promoted = false;
                if (!isDama(piece)) {
                    if (pOwner === 1 && dy === 7) { boardState[dRow][dCol] = 3; promoted = true; }
                    if (pOwner === 2 && dy === 0) { boardState[dRow][dCol] = 4; promoted = true; }
                }

                if (capturou && !promoted && hasAvailableCaptures(dx, dy)) {
                    turnState = 'multi_jump';
                    activePiece = {x: dx, y: dy};
                    mostrarMensagem(`Continue capturando com a peça em (${dx}, ${dy})!`, false, true);
                    document.getElementById('orig-x').value = dx; document.getElementById('orig-y').value = dy;
                    document.getElementById('dest-x').value = ''; document.getElementById('dest-y').value = '';
                    document.getElementById('dest-x').focus();
                } else {
                    turnState = 'normal'; activePiece = null;
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    let turnText = currentPlayer === 1 ? '<span style="color:#ff4757; font-size: 1.2em;">VERMELHAS</span>' : '<span style="color:#2f3542; font-size: 1.2em;">PRETAS</span>';
                    document.getElementById('turn-display').innerHTML = `VEZ DAS <br>${turnText}`;
                    mostrarMensagem("JOGADA FEITA!", false);
                    limparInputs();
                }

                drawBoard();

                let winner = checkWin();
                if (winner !== 0) {
                    let winColor = winner === 1 ? 'VERMELHAS' : 'PRETAS';
                    document.getElementById('turn-display').innerHTML = `🏆 VITÓRIA DAS <br><span style="color:${winner===1?'#ff4757':'#2f3542'};">${winColor}</span> 🏆`;
                    document.getElementById('btn-jogar').disabled = true;
                    mostrarMensagem(`FIM DE JOGO! As ${winColor} venceram!`, false, true);
                }
            }
        }

        initBoard();
        drawBoard();
    </script>
</body>
</html>
