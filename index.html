<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damas no Plano Cartesiano</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #eef2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { margin-bottom: 5px; color: #2c3e50; }
        .sub-header { margin-bottom: 20px; color: #7f8c8d; font-size: 1.1em; }
        
        .game-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex: 1; /* Permite que o rodapé fique no final */
        }
        
        .board-wrapper {
            display: flex;
            flex-direction: column;
        }
        .board-row { display: flex; }
        .square {
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dark { background-color: #a0522d; } 
        .light { background-color: #f5deb3; }
        
        /* Peças Vista Superior */
        .piece {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            box-sizing: border-box;
        }
        .red { 
            background-color: #ff4757; 
            border: 4px solid #b33939; 
        }
        .black { 
            background-color: #2f3542; 
            border: 4px solid #1e2229; 
        }
        
        /* Eixos Cartesianos */
        .y-axis { display: flex; flex-direction: column; width: 35px; }
        .y-label { 
            height: 65px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 22px; 
            color: #57606f;
        }
        .x-axis { display: flex; padding-left: 35px; height: 35px; }
        .x-label { 
            width: 65px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 22px; 
            color: #57606f;
        }
        
        /* Painel de Controles */
        .controls {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
        }
        .current-turn { 
            font-size: 22px; 
            text-align: center; 
            margin-bottom: 15px; 
            font-weight: bold;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .input-label { font-weight: 600; color: #4b4b4b; }
        .input-row { display: flex; gap: 10px; align-items: center; justify-content: center;}
        .coord-input {
            width: 60px;
            padding: 10px;
            font-size: 20px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 6px;
            transition: border-color 0.2s;
        }
        .coord-input:focus { border-color: #3498db; outline: none; }
        
        button {
            padding: 15px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover { background-color: #2ecc71; }
        button:active { transform: scale(0.98); }
        
        #message {
            font-weight: bold;
            color: #e67e22;
            min-height: 24px;
            text-align: center;
            margin-top: 10px;
            font-size: 1.1em;
        }

        /* Rodapé de Autoria */
        footer {
            margin-top: 40px;
            padding: 20px 0;
            width: 100%;
            text-align: center;
            font-weight: 600;
            color: #7f8c8d;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <h1>Damas no Plano Cartesiano</h1>
    <div class="sub-header">Utilize as coordenadas (X, Y) para mover as peças.</div>

    <div class="game-container">
        <div style="display: flex; flex-direction: column;">
            <div style="display: flex;">
                <div class="y-axis" id="y-axis"></div>
                <div class="board-wrapper" id="board"></div>
            </div>
            <div class="x-axis" id="x-axis"></div>
        </div>

        <div class="controls">
            <div class="current-turn" id="turn-display">Vez das <span style="color:#ff4757">Vermelhas</span></div>
            
            <div class="input-group">
                <div class="input-label">1. Coordenada da peça (Origem)</div>
                <div class="input-row">
                    X: <input type="number" id="orig-x" class="coord-input" min="1" max="8" placeholder="1-8">
                    Y: <input type="number" id="orig-y" class="coord-input" min="1" max="8" placeholder="1-8">
                </div>
            </div>

            <div class="input-group">
                <div class="input-label">2. Coordenada do destino</div>
                <div class="input-row">
                    X: <input type="number" id="dest-x" class="coord-input" min="1" max="8" placeholder="1-8">
                    Y: <input type="number" id="dest-y" class="coord-input" min="1" max="8" placeholder="1-8">
                </div>
            </div>

            <button onclick="fazerJogada()">Enviar Jogada</button>
            <div id="message"></div>
        </div>
    </div>

    <footer>@experimentajoao | Soluções no Ensino de Matemática</footer>

    <script>
        // Estado do jogo: 0=Vazio, 1=Vermelho, 2=Preto
        let boardState = [];
        let currentPlayer = 1; // 1 = Vermelho, 2 = Preto

        function initBoard() {
            boardState = [];
            for (let y = 8; y >= 1; y--) {
                let row = [];
                for (let x = 1; x <= 8; x++) {
                    let isDarkSquare = (x + y) % 2 === 0;
                    if (isDarkSquare && y <= 3) row.push(1);      
                    else if (isDarkSquare && y >= 6) row.push(2); 
                    else row.push(0);
                }
                boardState.push(row);
            }
        }

        function drawBoard() {
            const board = document.getElementById('board');
            const yAxis = document.getElementById('y-axis');
            const xAxis = document.getElementById('x-axis');
            
            board.innerHTML = '';
            yAxis.innerHTML = '';
            xAxis.innerHTML = '';

            for (let x = 1; x <= 8; x++) {
                let xLabel = document.createElement('div');
                xLabel.className = 'x-label';
                xLabel.innerText = x;
                xAxis.appendChild(xLabel);
            }

            for (let rowIdx = 0; rowIdx < 8; rowIdx++) {
                let yVal = 8 - rowIdx; 
                
                let yLabel = document.createElement('div');
                yLabel.className = 'y-label';
                yLabel.innerText = yVal;
                yAxis.appendChild(yLabel);

                let rowDiv = document.createElement('div');
                rowDiv.className = 'board-row';
                
                for (let colIdx = 0; colIdx < 8; colIdx++) {
                    let xVal = colIdx + 1;
                    let square = document.createElement('div');
                    let isDark = (xVal + yVal) % 2 === 0;
                    
                    square.className = 'square ' + (isDark ? 'dark' : 'light');

                    let pieceVal = boardState[rowIdx][colIdx];
                    if (pieceVal !== 0) {
                        let piece = document.createElement('div');
                        piece.className = 'piece ' + (pieceVal === 1 ? 'red' : 'black');
                        square.appendChild(piece);
                    }
                    rowDiv.appendChild(square);
                }
                board.appendChild(rowDiv);
            }
        }

        function mostrarMensagem(msg, isError = true) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = msg;
            msgDiv.style.color = isError ? "#e74c3c" : "#27ae60";
        }

        function limparInputs() {
            document.getElementById('orig-x').value = '';
            document.getElementById('orig-y').value = '';
            document.getElementById('dest-x').value = '';
            document.getElementById('dest-y').value = '';
        }

        function fazerJogada() {
            let ox = parseInt(document.getElementById('orig-x').value);
            let oy = parseInt(document.getElementById('orig-y').value);
            let dx = parseInt(document.getElementById('dest-x').value);
            let dy = parseInt(document.getElementById('dest-y').value);

            if (isNaN(ox) || isNaN(oy) || isNaN(dx) || isNaN(dy)) {
                mostrarMensagem("Por favor, preencha todas as coordenadas.");
                return;
            }

            if (ox<1 || ox>8 || oy<1 || oy>8 || dx<1 || dx>8 || dy<1 || dy>8) {
                mostrarMensagem("Coordenadas fora do limite (use apenas 1 a 8).");
                return;
            }

            let oCol = ox - 1;
            let oRow = 8 - oy;
            let dCol = dx - 1;
            let dRow = 8 - dy;

            let piece = boardState[oRow][oCol];
            
            if (piece === 0) {
                mostrarMensagem(`Não há peça em (${ox}, ${oy}).`);
                return;
            }
            if (piece !== currentPlayer) {
                mostrarMensagem(`Turno errado. Vez das ${currentPlayer === 1 ? 'Vermelhas' : 'Pretas'}.`);
                return;
            }
            if (boardState[dRow][dCol] !== 0) {
                mostrarMensagem(`O destino (${dx}, ${dy}) está ocupado.`);
                return;
            }
            if ((dx + dy) % 2 !== 0) {
                mostrarMensagem("Movimento inválido: deve ser para uma casa escura.");
                return;
            }

            let diffX = dx - ox;
            let diffY = dy - oy;
            let direcaoY = (piece === 1) ? 1 : -1; 
            let moveu = false;

            if (Math.abs(diffX) === 1 && diffY === direcaoY) {
                boardState[dRow][dCol] = piece;
                boardState[oRow][oCol] = 0;
                moveu = true;
            } 
            else if (Math.abs(diffX) === 2 && Math.abs(diffY) === 2) {
                let meioCol = oCol + (diffX / 2);
                let meioRow = oRow - (diffY / 2); 
                let pecaCapturada = boardState[meioRow][meioCol];

                if (pecaCapturada !== 0 && pecaCapturada !== piece) {
                    boardState[meioRow][meioCol] = 0; 
                    boardState[dRow][dCol] = piece; 
                    boardState[oRow][oCol] = 0;
                    moveu = true;
                } else {
                    mostrarMensagem("Captura inválida: nenhum oponente para pular.");
                }
            } else {
                mostrarMensagem("A peça só move na diagonal (frente ou captura).");
            }

            if (moveu) {
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                let turnText = currentPlayer === 1 ? '<span style="color:#ff4757">Vermelhas</span>' : '<span style="color:#2f3542">Pretas</span>';
                document.getElementById('turn-display').innerHTML = `Vez das ${turnText}`;
                
                mostrarMensagem("Jogada realizada!", false);
                limparInputs();
                drawBoard();
            }
        }

        initBoard();
        drawBoard();
    </script>
</body>
</html>
