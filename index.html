<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damas no Plano Cartesiano</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #eef2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { margin-bottom: 5px; color: #2c3e50; }
        .sub-header { margin-bottom: 20px; color: #7f8c8d; font-size: 1.1em; }
        
        .game-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex: 1;
        }
        
        .board-wrapper {
            display: flex;
            flex-direction: column;
        }
        .board-row { display: flex; }
        .square {
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dark { background-color: #a0522d; } 
        .light { background-color: #f5deb3; }
        
        /* Peças Vista Superior */
        .piece {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            box-sizing: border-box;
        }
        .red { 
            background-color: #ff4757; 
            border: 4px solid #b33939; 
        }
        .black { 
            background-color: #2f3542; 
            border: 4px solid #1e2229; 
        }
        
        /* Eixos Cartesianos */
        .y-axis { display: flex; flex-direction: column; width: 35px; }
        .y-label { 
            height: 65px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 22px; 
            color: #57606f;
        }
        .x-axis { display: flex; padding-left: 35px; height: 35px; }
        .x-label { 
            width: 65px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 22px; 
            color: #57606f;
        }
        
        /* Painel de Controles */
        .controls {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 340px; /* Levemente mais largo para acomodar textos maiores */
        }

        /* Textos Gamificados */
        .current-turn { 
            font-size: 32px; /* Fonte bem maior */
            text-transform: uppercase; /* Tudo em maiúsculo */
            letter-spacing: 1px;
            text-align: center; 
            margin-bottom: 10px; 
            font-weight: 900;
            border-bottom: 3px solid #eee;
            padding-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .input-label { font-weight: 700; color: #2c3e50; font-size: 1.1em; }
        .input-row { display: flex; gap: 10px; align-items: center; justify-content: center; font-weight: bold;}
        .coord-input {
            width: 60px;
            padding: 10px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 6px;
            transition: border-color 0.2s;
        }
        .coord-input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 8px rgba(52, 152, 219, 0.3); }
        
        button {
            padding: 18px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 900;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 0 #219653; /* Efeito de botão 3D de jogo */
        }
        button:hover { background-color: #2ecc71; }
        button:active { 
            transform: translateY(4px); 
            box-shadow: 0 0 0 #219653; 
        }
        
        #message {
            font-weight: 900;
            min-height: 24px;
            text-align: center;
            margin-top: 10px;
            font-size: 1.3em;
            text-transform: uppercase;
            padding: 0;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.8);
        }

        /* Rodapé de Autoria */
        footer {
            margin-top: 40px;
            padding: 20px 0;
            width: 100%;
            text-align: center;
            font-weight: 600;
            color: #7f8c8d;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <h1>Damas no Plano Cartesiano</h1>
    <div class="sub-header">Utilize as coordenadas (X, Y) para mover as peças.</div>

    <div class="game-container">
        <div style="display: flex; flex-direction: column;">
            <div style="display: flex;">
                <div class="y-axis" id="y-axis"></div>
                <div class="board-wrapper" id="board"></div>
            </div>
            <div class="x-axis" id="x-axis"></div>
        </div>

        <div class="controls">
            <div class="current-turn" id="turn-display">VEZ DAS <br><span style="color:#ff4757; font-size: 1.2em;">VERMELHAS</span></div>
            
            <div class="input-group">
                <div class="input-label">1. Origem da Peça</div>
                <div class="input-row">
                    X: <input type="number" id="orig-x" class="coord-input" min="0" max="7">
                    Y: <input type="number" id="orig-y" class="coord-input" min="0" max="7">
                </div>
            </div>

            <div class="input-group">
                <div class="input-label">2. Destino</div>
                <div class="input-row">
                    X: <input type="number" id="dest-x" class="coord-input" min="0" max="7">
                    Y: <input type="number" id="dest-y" class="coord-input" min="0" max="7">
                </div>
            </div>

            <button onclick="fazerJogada()">Enviar Jogada</button>
            <div id="message"></div>
        </div>
    </div>

    <footer>@experimentajoao | Soluções no Ensino de Matemática</footer>

    <script>
        let boardState = [];
        let currentPlayer = 1;

        function initBoard() {
            boardState = [];
            for (let rowIdx = 0; rowIdx < 8; rowIdx++) {
                let row = [];
                let y = 7 - rowIdx; 
                for (let x = 0; x <= 7; x++) {
                    let isDarkSquare = (x + y) % 2 === 0;
                    if (isDarkSquare && y <= 2) row.push(1);
                    else if (isDarkSquare && y >= 5) row.push(2);
                    else row.push(0);
                }
                boardState.push(row);
            }
        }

        function drawBoard() {
            const board = document.getElementById('board');
            const yAxis = document.getElementById('y-axis');
            const xAxis = document.getElementById('x-axis');
            
            board.innerHTML = '';
            yAxis.innerHTML = '';
            xAxis.innerHTML = '';

            for (let x = 0; x <= 7; x++) {
                let xLabel = document.createElement('div');
                xLabel.className = 'x-label';
                xLabel.innerText = x;
                xAxis.appendChild(xLabel);
            }

            for (let rowIdx = 0; rowIdx < 8; rowIdx++) {
                let yVal = 7 - rowIdx; 
                
                let yLabel = document.createElement('div');
                yLabel.className = 'y-label';
                yLabel.innerText = yVal;
                yAxis.appendChild(yLabel);

                let rowDiv = document.createElement('div');
                rowDiv.className = 'board-row';
                
                for (let colIdx = 0; colIdx < 8; colIdx++) {
                    let xVal = colIdx;
                    let square = document.createElement('div');
                    let isDark = (xVal + yVal) % 2 === 0;
                    
                    square.className = 'square ' + (isDark ? 'dark' : 'light');

                    let pieceVal = boardState[rowIdx][colIdx];
                    if (pieceVal !== 0) {
                        let piece = document.createElement('div');
                        piece.className = 'piece ' + (pieceVal === 1 ? 'red' : 'black');
                        square.appendChild(piece);
                    }
                    rowDiv.appendChild(square);
                }
                board.appendChild(rowDiv);
            }
        }

        function mostrarMensagem(msg, isError = true) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = msg;
            
            // Estilos dinâmicos de Gamificação
            msgDiv.style.opacity = '1';
            msgDiv.style.transform = 'scale(1)';
            msgDiv.style.padding = '12px';
            msgDiv.style.color = '#fff';
            msgDiv.style.boxShadow = '0 4px 10px rgba(0,0,0,0.2)';

            if (isError) {
                msgDiv.style.backgroundColor = '#e74c3c'; // Fundo vermelho para erro
            } else {
                msgDiv.style.backgroundColor = '#2ecc71'; // Fundo verde para sucesso
                
                // Esconde a mensagem de sucesso depois de 3 segundos para limpar a tela
                setTimeout(() => {
                    msgDiv.style.opacity = '0';
                    msgDiv.style.transform = 'scale(0.8)';
                }, 3000);
            }
        }

        function limparInputs() {
            document.getElementById('orig-x').value = '';
            document.getElementById('orig-y').value = '';
            document.getElementById('dest-x').value = '';
            document.getElementById('dest-y').value = '';
            // Foca automaticamente no primeiro campo para agilizar a próxima jogada
            document.getElementById('orig-x').focus();
        }

        function fazerJogada() {
            let ox = parseInt(document.getElementById('orig-x').value);
            let oy = parseInt(document.getElementById('orig-y').value);
            let dx = parseInt(document.getElementById('dest-x').value);
            let dy = parseInt(document.getElementById('dest-y').value);

            if (isNaN(ox) || isNaN(oy) || isNaN(dx) || isNaN(dy)) {
                mostrarMensagem("Preencha todas as coordenadas!");
                return;
            }

            if (ox<0 || ox>7 || oy<0 || oy>7 || dx<0 || dx>7 || dy<0 || dy>7) {
                mostrarMensagem("Fora do limite (Use 0 a 7)!");
                return;
            }

            let oCol = ox;
            let oRow = 7 - oy;
            let dCol = dx;
            let dRow = 7 - dy;

            let piece = boardState[oRow][oCol];
            
            if (piece === 0) {
                mostrarMensagem("Casa de origem vazia!");
                return;
            }
            if (piece !== currentPlayer) {
                mostrarMensagem(`TURNO ERRADO! Vez das ${currentPlayer === 1 ? 'VERMELHAS' : 'PRETAS'}!`);
                return;
            }
            if (boardState[dRow][dCol] !== 0) {
                mostrarMensagem("Casa de destino ocupada!");
                return;
            }
            if ((dx + dy) % 2 !== 0) {
                mostrarMensagem("Movimento inválido!");
                return;
            }

            let diffX = dx - ox;
            let diffY = dy - oy;
            let direcaoY = (piece === 1) ? 1 : -1; 
            let moveu = false;

            if (Math.abs(diffX) === 1 && diffY === direcaoY) {
                boardState[dRow][dCol] = piece;
                boardState[oRow][oCol] = 0;
                moveu = true;
            } 
            else if (Math.abs(diffX) === 2 && Math.abs(diffY) === 2) {
                let meioCol = oCol + (diffX / 2);
                let meioRow = oRow - (diffY / 2); 
                let pecaCapturada = boardState[meioRow][meioCol];

                if (pecaCapturada !== 0 && pecaCapturada !== piece) {
                    boardState[meioRow][meioCol] = 0; 
                    boardState[dRow][dCol] = piece; 
                    boardState[oRow][oCol] = 0;
                    moveu = true;
                } else {
                    mostrarMensagem("Captura inválida!");
                }
            } else {
                mostrarMensagem("Movimento não permitido!");
            }

            if (moveu) {
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                let turnText = currentPlayer === 1 ? '<span style="color:#ff4757; font-size: 1.2em;">VERMELHAS</span>' : '<span style="color:#2f3542; font-size: 1.2em;">PRETAS</span>';
                document.getElementById('turn-display').innerHTML = `VEZ DAS <br>${turnText}`;
                
                mostrarMensagem("JOGADA FEITA!", false);
                limparInputs();
                drawBoard();
            }
        }

        initBoard();
        drawBoard();
    </script>
</body>
</html>
